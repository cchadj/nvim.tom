# pane-resize.conf — resize panes with Alt+hjkl (no prefix required)
#
# Source from ~/.tmux.conf:
#   source-file ~/.config/nvim.tom/tmux/pane-resize.conf

# Resize by 3 cells per keypress; adjust to taste.
bind -n M-h resize-pane -L 3
bind -n M-j resize-pane -D 3
bind -n M-k resize-pane -U 3
bind -n M-l resize-pane -R 3
