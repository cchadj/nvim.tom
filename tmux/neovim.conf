# neovim.conf — tmux settings required for a good Neovim experience
#
# Source from ~/.tmux.conf:
#   source-file ~/.config/nvim.tom/tmux/neovim.conf

# Reduce escape-time so Neovim's Esc key is instant.
# Default is 500ms which causes a noticeable delay when leaving insert mode.
set -sg escape-time 10
